# /etc/nginx/snippets/smartstudio-mcp.conf
# Include this from the tenant's `server { ... }` block (next to the
# existing /api proxy):
#
#     include /etc/nginx/snippets/smartstudio-mcp.conf;
#
# The Streamable-HTTP MCP transport uses SSE for server-initiated messages,
# so proxy_buffering must be off and Connection must be cleared.

location /mcp {
    proxy_pass         http://127.0.0.1:3101/mcp;
    proxy_http_version 1.1;

    # Required for SSE / long-lived streams.
    proxy_set_header   Connection "";
    proxy_buffering    off;
    proxy_cache        off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;

    # Pass through identity + auth.
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   Authorization     $http_authorization;
    proxy_set_header   Mcp-Session-Id    $http_mcp_session_id;
}

# Unauthenticated health probe for load balancers / uptime checks.
location = /mcp/healthz {
    proxy_pass http://127.0.0.1:3101/healthz;
    access_log off;
}
