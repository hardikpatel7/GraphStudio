# Bolt Basket dark-store inventory graph.
# Spine: category → subcategory → brand → SKU (product dimension)
# Metrics: on-hand, available, daily velocity, days of supply, fill rate
#
# This file is the starter template copied into a fresh tenant's
# `<data_dir>/graphs/` on bootstrap. Operators can rename the id /
# edit fields per-tenant; the file lives in the tenant data dir from
# that point on.

id           = "boltbasket-inventory-graph"
display_name = "Bolt Basket Inventory Graph"

# ─── Sources ────────────────────────────────────────────────────────────

# Primary spine + metrics source. v_store_positions is a per-SKU view
# that includes both the product hierarchy columns (category_l1/l2,
# brand, sku_code) and the position/performance metrics (on_hand_units,
# available_units, daily_velocity, days_of_supply, fill_rate_pct).
[[sources]]
alias       = "store_positions"
table       = "v_store_positions"
attaches_at = "sku_code"

# ─── Product hierarchy (primary) ────────────────────────────────────────
#
# Top-to-leaf order is declaration order — the engine relies on
# `toml`'s `preserve_order` feature to walk `[hierarchy.product.<level>]`
# blocks in the same sequence they appear here.

[hierarchy.product]
source = "store_positions"

[hierarchy.product.category_l1]
column = "category_l1"

[hierarchy.product.category_l2]
column = "category_l2"

[hierarchy.product.brand]
column = "brand"

[hierarchy.product.sku_code]
column = "sku_code"

# ─── Metrics ────────────────────────────────────────────────────────────

[metrics.store_positions]
on_hand_units   = { rollup = "sum" }
available_units = { rollup = "sum" }
daily_velocity  = { rollup = "avg" }
days_of_supply  = { rollup = "avg" }
fill_rate_pct   = { rollup = "avg" }
