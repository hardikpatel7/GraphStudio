# Inventory Graph — metadata-driven graph spec for the inventorysmart
# product line. Built by the `graph` engine in `server/src/graph/`.
#
# This file is the starter template copied into a fresh tenant's
# `<data_dir>/graphs/` on bootstrap. Operators can rename the id /
# edit fields per-tenant; the file lives in the tenant data dir from
# that point on.

id           = "default"
display_name = "Inventory Graph"

# ─── Sources ────────────────────────────────────────────────────────────
#
# Each source declares one DuckDB table that the engine reads from. A
# source's role is inferred from `attaches_at` + relations (Decision 36):
# - has `attaches_at` → metric or spine source
# - no `attaches_at`, ≥ 2 relations to different hierarchies → bridge

# Product hierarchy spine. ph_master is the canonical "one row per
# article" view; we walk it to thread l0→…→l5→article→product_code.
[[sources]]
alias       = "ph_master"
table       = "asv2_ph_master"
attaches_at = "article"

# Inventory metrics, keyed by ph_code. For the engine to attach these
# directly to article nodes, the source needs an `article` column —
# either via a DuckDB view `asv2_inventory_by_article(article, oh, oo,
# it, reserve_quantity, allocated_units)` that joins inventory with
# ph_master, or via a `[[relation]]` from inventory.ph_code →
# ph_master.ph_code (Phase 3-bis: relation-bridged attach).
#
# Until that lands, point this at the pre-joined view so the source
# row contract matches `attaches_at = "article"` (Decision 33 — column
# names align with the attach kind's identifying column → no relation
# needed).
[[sources]]
alias       = "inventory"
table       = "asv2_inventory_by_article"   # joined view; see comment above
attaches_at = "article"

[[sources]]
alias       = "txs_metrics"
table       = "asv2_txs_metrics_by_article" # joined view; same rationale
attaches_at = "article"

# WOC (weeks of cover) target metrics, natively keyed by ph_code. No
# pre-join needed once ph_code is a real level on the product hierarchy.
[[sources]]
alias       = "woc"
table       = "asv2_woc"
attaches_at = "ph_code"

# Store hierarchy spine. store_channels carries both `store_code` and
# `channel`, filtered to active rows. The V1 graph additionally
# intersects with raw_store_master(active=true AND is_deleted=false);
# representing that in TOML is a Phase 3-bis multi-source-per-hierarchy
# feature. For parity, materialize a view
# `v_active_store_channels(channel, store_code)` that AND-joins both
# filters.
[[sources]]
alias       = "store_channels"
table       = "v_active_store_channels"     # pre-joined active view
attaches_at = "store_code"
filter      = ""                            # filtering done in the view

# Per-store metrics. v_aid_per_store is a pre-aggregated view (one row
# per store_code) that unpivots the positional HUGEINT[] arrays on
# asv2_aid_per_store using asv2_store_index. Surfaces sales (lw_units/
# revenue/margin) and a stockout signal pair (articles_in_stock,
# articles_total) at the store_code level — consumers compute
# in-stock-rate as the ratio. Per-(article, store) OH is NOT in this
# tenant's DuckDB today; see planner-data-gaps.md for the ingestion
# follow-on.
[[sources]]
alias       = "aid_per_store"
table       = "v_aid_per_store"
attaches_at = "store_code"

# Brand spine source. ph_master itself plays the article-attach role
# above, so we declare a second alias pointing at the same table for
# the brand hierarchy's spine — keeps the "one source per role" rule
# clean (Decision 36 splits metric / bridge / spine source roles
# instead of allowing one source to play several). At read time it's
# the same SELECT against asv2_ph_master.
[[sources]]
alias       = "ph_master_as_brand_source"
table       = "asv2_ph_master"
attaches_at = "brand"

# Store-group spine. raw_store_groups carries (sg_code, name); we use
# `name` as the display value (planner asks "Sunbelt-A") and `sg_code`
# as the join key for the bridge below. is_deleted=false filters out
# retired groups so they don't surface in cross-filter projections.
[[sources]]
alias       = "raw_store_groups"
table       = "raw_store_groups"
attaches_at = "store_group"
filter      = "is_deleted = false"

# DC hierarchy spine. asv2_dc_index has (idx, dc_code); we use dc_code
# as the level's identity. Small table (5 DCs on bealls). The level
# name is `dc_code` (not `dc`) to satisfy the engine's metric-attach
# convention (kind name == identity column name) — see
# attach_metrics_from_source fallback in build.rs.
[[sources]]
alias       = "dc_index_source"
table       = "asv2_dc_index"
attaches_at = "dc_code"

# Per-DC inventory metrics. v_inventory_per_dc is a pre-aggregated view
# (one row per dc_code) that unpivots the positional HUGEINT[] arrays
# on asv2_inventory_per_dc using asv2_dc_index. Sum-rollup is identity
# at the leaf (5 rows, 5 nodes); kept for consistency with
# [metrics.inventory].
[[sources]]
alias       = "inventory_per_dc"
table       = "v_inventory_per_dc"
attaches_at = "dc_code"

# Product_code ↔ DC bridge. v_product_dc unpivots the pipe-delimited
# dc_codes column on asv2_product_dc into one (product_code, dc_code)
# row per edge. Bealls today: every product_code is served by DC214 &
# DC215 → 332k bridge rows.
#
# The relation's `to.columns = ["product_codes"]` (plural) matches the
# spine source's COLUMN name on the product_code level — that column
# carries the pipe-delimited list and uses `split = "|"` to fan-out
# child nodes whose identities are the individual tokens. The bridge
# values are individual tokens too, so `graph.find(product_code_kind,
# "96877652")` resolves correctly.
[[sources]]
alias = "product_dc_bridge"
table = "v_product_dc"

[[relation]]
from = { alias = "product_dc_bridge", columns = ["product_code"],  cardinality = "*" }
to   = { alias = "ph_master",         columns = ["product_codes"], cardinality = "1" }

[[relation]]
from = { alias = "product_dc_bridge", columns = ["dc_code"],     cardinality = "*" }
to   = { alias = "dc_index_source",   columns = ["dc_code"],     cardinality = "1" }

# Store ↔ DC bridge. raw_store_dc_mapping is already shaped correctly
# (store_code BIGINT + dc_code BIGINT); no view needed.
[[sources]]
alias = "store_dc_bridge"
table = "raw_store_dc_mapping"

[[relation]]
from = { alias = "store_dc_bridge", columns = ["store_code"], cardinality = "*" }
to   = { alias = "store_channels",  columns = ["store_code"], cardinality = "1" }

[[relation]]
from = { alias = "store_dc_bridge", columns = ["dc_code"],     cardinality = "*" }
to   = { alias = "dc_index_source", columns = ["dc_code"],     cardinality = "1" }

# Store-group ↔ store_code bridge. Many-to-many: one store can belong
# to multiple groups (~35 groups/store on bealls; 28k mapping rows
# across 25 active groups × 809 stores). No `attaches_at` → bridge role
# inferred from the two relations below to different hierarchies.
#
# Joins on `name` (not sg_code) because graph_v2's LevelSpec.key is
# half-wired today: bridge resolution honors it but the spine builder
# interns identities from `column` only — see filed bug. Workaround
# below uses a view that surfaces both store_code and the resolved
# group name so all joins land on the same string identities the
# spines intern. Once the engine fix lands, switch back to raw_store_
# groups_mapping + key="sg_code".
[[sources]]
alias = "store_groups_mapping"
table = "v_store_groups_mapping"   # joined view: store_code + name

[[relation]]
from = { alias = "store_groups_mapping", columns = ["store_code"], cardinality = "*" }
to   = { alias = "store_channels",       columns = ["store_code"], cardinality = "1" }

[[relation]]
from = { alias = "store_groups_mapping", columns = ["name"], cardinality = "*" }
to   = { alias = "raw_store_groups",     columns = ["name"], cardinality = "1" }

# Brand cross-edge bridge. Connects article ↔ brand via the same
# ph_master row (each row has one article + one brand). No
# attaches_at → bridge role inferred from the two relations below
# pointing to different hierarchies (product, brand).
[[sources]]
alias = "ph_master_brand_bridge"
table = "asv2_ph_master"

[[relation]]
from = { alias = "ph_master_brand_bridge", columns = ["article"], cardinality = "*" }
to   = { alias = "ph_master",              columns = ["article"], cardinality = "1" }

[[relation]]
from = { alias = "ph_master_brand_bridge",    columns = ["brand"], cardinality = "*" }
to   = { alias = "ph_master_as_brand_source", columns = ["brand"], cardinality = "1" }

# Channel cross-edge bridge. Same shape as the brand bridge — each
# ph_master row carries (article, channel), and the store hierarchy
# already declares `channel` as a level. Materializes the per-article
# `article_to_channel` edge that v1's `cross_indices` carries inline.
[[sources]]
alias = "ph_master_channel_bridge"
table = "asv2_ph_master"

[[relation]]
from = { alias = "ph_master_channel_bridge", columns = ["article"], cardinality = "*" }
to   = { alias = "ph_master",                columns = ["article"], cardinality = "1" }

[[relation]]
from = { alias = "ph_master_channel_bridge", columns = ["channel"], cardinality = "*" }
to   = { alias = "store_channels",           columns = ["channel"], cardinality = "1" }

# ─── Bridge sources (Phase 3-bis — engine does not yet materialize cross-edges) ───
#
# These are listed for spec completeness; when the bridge-source
# cross-edge path lands in build.rs, they'll start producing edges
# without further TOML changes.

# product_code → DC. Pipe-delimited dc_codes column on asv2_product_dc.
#
# [[sources]]
# alias  = "product_dc"
# table  = "asv2_product_dc"
# # No attaches_at → bridge. Relations to product.product_code and a
# # future dc hierarchy.
#
# [[relation]]
# from = { alias = "product_dc", columns = ["product_code"], cardinality = "*" }
# to   = { alias = "ph_master",  columns = ["product_code"], cardinality = "1" }

# store_code → DC.
#
# [[sources]]
# alias  = "store_dc_mapping"
# table  = "raw_store_dc_mapping"
#
# [[relation]]
# from = { alias = "store_dc_mapping", columns = ["store_code"], cardinality = "*" }
# to   = { alias = "store_channels",   columns = ["store_code"], cardinality = "1" }

# store_code → store_group. Many-to-many edge collapsed via the
# bridge-source convention.
#
# [[sources]]
# alias  = "store_groups_mapping"
# table  = "raw_store_groups_mapping"

# brand → article. The V1 graph keeps brand off the hierarchy spine
# and indexes it as a cross-edge `brand_to_articles`. In the v2 model
# this is either a single-level `[hierarchy.brand]` with ph_master as
# bridge, or a tag-style annotation; design call deferred along with
# the bridge runtime. Keeping ph_master.brand in the column list so a
# future bridge source can read it without re-extracting.

# ─── Product hierarchy (primary, per Decision 31) ─────────────────────
#
# Top-to-leaf order is declaration order — the engine relies on
# `toml`'s `preserve_order` feature to walk `[hierarchy.product.<level>]`
# blocks in the same sequence they appear here.

[hierarchy.product]
source = "ph_master"

[hierarchy.product.l0]          # Department
column = "l0_name"

[hierarchy.product.l1]          # Class
column = "l1_name"

[hierarchy.product.l2]          # Sub-class
column = "l2_name"

[hierarchy.product.l3]
column = "l3_name"

[hierarchy.product.l4]
column = "l4_name"

[hierarchy.product.l5]
column = "l5_name"

# ph_code = style-color identifier. One step above article: a single
# ph_code groups all SKU variants of one style/color. Sits between l5
# (most specific named class) and article (the SKU). Lets ph_code-keyed
# metrics (asv2_woc, asv2_before_alloc) attach directly without a
# pre-join view.
[hierarchy.product.ph_code]
column = "ph_code"

[hierarchy.product.article]
column = "article"

# product_codes is a legacy `'|'`-delimited VARCHAR. `split` expands
# each row into N sibling product_code leaves under the article.
# Migrating the column to LIST<VARCHAR> would let us swap this to
# `unnest = true` without any spec changes elsewhere.
[hierarchy.product.product_code]
column = "product_codes"
split  = "|"

# ─── Store hierarchy (auxiliary) ──────────────────────────────────────

[hierarchy.store]
source = "store_channels"

[hierarchy.store.channel]
column = "channel"

[hierarchy.store.store_code]
column = "store_code"

# ─── Brand hierarchy (auxiliary, single-level tag) ────────────────────
#
# In V1's article_graph, brand is a cross-index (StrId → article ids).
# V2 promotes it to a one-level hierarchy so the runtime can reach it
# via the same traverse / cross-filter / project paths as any other
# kind. The article↔brand bridge above materializes the cross-edge.

[hierarchy.brand]
source = "ph_master_as_brand_source"

[hierarchy.brand.brand]
column = "brand"

# ─── Store-group hierarchy (auxiliary, single-level tag) ──────────────
#
# Single level. Identity = name (e.g. "Sunbelt-A"). See note on the
# store_groups_mapping bridge source above for why we don't use sg_code
# as a separate key column today.
[hierarchy.store_group]
source = "raw_store_groups"

[hierarchy.store_group.store_group]
column = "name"

# ─── DC hierarchy (auxiliary, single-level) ───────────────────────────
#
# DC codes are BIGINT identifiers. Single level; the bridges above link
# DCs to product_codes (via asv2_product_dc) and to store_codes (via
# raw_store_dc_mapping). Level name is `dc_code` because the engine's
# metric-attach uses kind name as the source identity column.
[hierarchy.dc]
source = "dc_index_source"

[hierarchy.dc.dc_code]
column = "dc_code"

# ─── Metrics ──────────────────────────────────────────────────────────
#
# Eight scalar `sum` metrics — five inventory, three transaction —
# matching the existing `MetricKind` enum's `METRIC_COUNT = 8`. The
# metric id is the TOML key; `column` is omitted when it matches the id.

[metrics.inventory]
oh               = { rollup = "sum" }
oo               = { rollup = "sum" }
it               = { rollup = "sum" }
reserve_quantity = { rollup = "sum" }
allocated_units  = { rollup = "sum" }

[metrics.txs_metrics]
lw_units   = { rollup = "sum" }
lw_revenue = { rollup = "sum" }
lw_margin  = { rollup = "sum" }

# WOC (weeks of cover) — ratio metric, doesn't add cleanly across
# siblings. The engine's `avg` rollup is documented (graph_v2/rollup.rs)
# as "approximated as sum in Phase 2 — true mean requires a sideband
# count tracker", so using avg would yield misleading values at parent
# levels. Using `min` here surfaces the worst (= lowest) cover anywhere
# in the subtree — actionable for stockout-risk reads. Switch to `avg`
# once the engine tracks (sum, count) pairs.
#
# min_woc / max_woc bound the planner-set target band; they rollup as
# min and max respectively so the band tightens as it bubbles up — the
# strictest child wins.
[metrics.woc]
woc     = { rollup = "min" }
min_woc = { rollup = "min" }
max_woc = { rollup = "max" }

# Per-DC inventory totals — pre-aggregated at the dc level. Sum rollup
# is identity at the leaf (DC is a single-level hierarchy) but kept
# consistent with [metrics.inventory] so the metric names are uniform.
[metrics.inventory_per_dc]
oh               = { rollup = "sum" }
oo               = { rollup = "sum" }
it               = { rollup = "sum" }
reserve_quantity = { rollup = "sum" }

# Per-store sales + stockout signal — pre-aggregated at the store_code
# level. The articles_in_stock / articles_total pair lets consumers
# derive in-stock-rate without a ratio rollup (the engine doesn't
# support true mean yet — see fb_1778928755779239000). Sum rollup
# is identity at store_code; aggregates correctly up to channel.
[metrics.aid_per_store]
lw_units          = { rollup = "sum" }
lw_revenue        = { rollup = "sum" }
lw_margin         = { rollup = "sum" }
articles_in_stock = { rollup = "sum" }
articles_total    = { rollup = "sum" }
