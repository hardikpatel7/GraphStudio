# Pack-shape configuration per (article, size, pack_type). The
# allocator must round any computed quantity to a sum of these pack
# sizes — so this DV answers "what pack constraints apply to this
# article?" and "which articles have case packs of N units?"
id           = "dv_pack_constraints"
display_name = "Pack Constraints"

[source]
source_id = "src_pack_constraints"

[[columns]]
name = "article"
type = "VARCHAR"
sortable = true
searchable = true
visible = true
group = "identity"

[[columns]]
name = "parent_article"
type = "VARCHAR"
sortable = true
searchable = true
visible = true
group = "identity"

[[columns]]
name = "product_code"
type = "VARCHAR"
sortable = true
searchable = true
visible = true
group = "identity"

[[columns]]
name = "size"
type = "VARCHAR"
sortable = true
searchable = true
visible = true
group = "identity"

[[columns]]
name = "pack_type"
type = "VARCHAR"
sortable = true
searchable = true
visible = true
group = "pack"

[[columns]]
name = "pack_type_id"
type = "VARCHAR"
sortable = true
visible = false
group = "pack"

[[columns]]
name = "pack_description"
type = "VARCHAR"
sortable = true
searchable = true
visible = true
group = "pack"

[[columns]]
name = "pack_size"
type = "VARCHAR"
sortable = true
visible = true
group = "pack"

[[columns]]
name = "units_in_pack"
type = "INTEGER"
sortable = true
visible = true
group = "constraint"
