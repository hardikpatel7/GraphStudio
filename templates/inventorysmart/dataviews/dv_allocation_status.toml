# Allocation workflow lifecycle status. One row per allocation_code per
# status transition. The allocation_code matches dv_allocation_split_po
# so the planner can pivot from a workflow surface to the per-(article,
# store) detail and back.
id           = "dv_allocation_status"
display_name = "Allocation Status"

[source]
source_id = "src_allocation_status"

[[columns]]
name = "allocation_code"
type = "VARCHAR"
sortable = true
searchable = true
visible = true
group = "identity"

[[columns]]
name = "status"
type = "VARCHAR"
sortable = true
searchable = true
visible = true
group = "lifecycle"

[[columns]]
name = "status_time"
type = "TIMESTAMP"
sortable = true
visible = true
group = "lifecycle"

[[columns]]
name = "number_articles"
type = "BIGINT"
sortable = true
visible = true
group = "scope"

[[columns]]
name = "remarks"
type = "VARCHAR"
sortable = true
searchable = true
visible = true
group = "lifecycle"

[[columns]]
name = "is_terminal"
type = "BOOLEAN"
sortable = true
visible = true
group = "lifecycle"

# Parsed from allocation_code. status_time records per-phase event time
# (e.g., when a "Start"/"End" row was written), but the run-identity
# timestamp lives in allocation_code itself — useful when bucketing
# phase events back to their parent run.
[[columns]]
name = "run_started_at"
type = "TIMESTAMP"
sortable = true
visible = true
group = "lifecycle"
