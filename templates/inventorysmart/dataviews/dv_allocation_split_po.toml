# Per-(article, store) allocation results from the latest Gurobi run.
# Carries source-DC labeling (inventory_source, source) and quantities
# (demand, allocated_total, oh/oo/it, wos) so the planner can answer
# "where are allocations coming from?", "which POs cover which stockouts?",
# and "DC vs cross-ship mix per store/category?"
id           = "dv_allocation_split_po"
display_name = "Allocation Results (split-PO)"

[source]
source_id = "src_allocation_split_po"

[[columns]]
name = "article"
type = "VARCHAR"
sortable = true
searchable = true
visible = true
group = "identity"

[[columns]]
name = "store"
type = "VARCHAR"
sortable = true
searchable = true
visible = true
group = "identity"

