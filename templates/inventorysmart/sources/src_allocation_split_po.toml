# Live allocation output from the Gurobi run. Per-(article, store)
# allocation rows with source-DC labeling, demand, OH/OO/IT, allocated
# units, and workflow state (status, is_edited, delivery_dt).
#
# Source-table caveat: on bealls UAT the canonical non-dated table
# `create_allocation_result_flat_gurobi_split_po` is empty between runs.
# Per-run snapshots live in dated companions like
# `..._split_po_YYYYMMDD`. This source points at the latest non-empty
# snapshot. When the upstream system standardizes the live-run pattern,
# switch back to the canonical table. Filed as a separate gap.
#
# Backs dv_allocation_split_po. Closes prompts D4, V1, V4, CN1, CN2, CN3
# from docs/planner-prompts-run.md.
id             = "src_allocation_split_po"
display_name   = "Allocation Results (split-PO, live PG)"
kind           = "pg_query"
connection_ref = "uat"

[config]
sql = """
SELECT
  article,
  store,
  store_name,
  store_grade,
  inventory_source,
  source,
  allocation_code,
  allocation_strategy,
  order_type,
  demand,
  allocated_total,
  allocated_total_orig,
  min,
  max,
  oh,
  oo,
  it,
  oh_oo_intransit,
  final_inv_available,
  wos,
  wk_count_final,
  ros,
  aps,
  status,
  is_edited,
  is_scenario,
  delivery_dt,
  updated_at,
  created_by_username,
  updated_by_username
FROM inventory_smart.create_allocation_result_flat_gurobi_split_po_20260501
WHERE is_deleted IS NOT TRUE
"""
