# Article-supersession mappings — `old_article` is replaced by `article`
# starting `start_date`, optionally ending `end_date`, with `priority`
# ordering when multiple successors exist. `has_store_exception` signals
# that one or more stores override the default chain (look up the
# overrides in product_supersession_store_priority when needed).
#
# Backs dv_supersession_chain. Closes "what replaced SKU N?" /
# "show me the active supersession chain for category X" prompts.
id             = "src_supersession_chain"
display_name   = "Product Supersession Mappings (live PG)"
kind           = "pg_query"
connection_ref = "uat"

[config]
sql = """
SELECT
  ps_code,
  old_article,
  old_product_code,
  article AS new_article,
  product_code AS new_product_code,
  priority,
  start_date,
  end_date,
  has_store_exception,
  updated_by,
  updated_at,
  created_by,
  created_at,
  -- Active today: start_date is set and in the past, and either
  -- end_date is NULL or in the future. Surface as a bool so filters
  -- don't have to re-encode the date comparison each time.
  (start_date IS NOT NULL
    AND start_date <= CURRENT_DATE
    AND (end_date IS NULL OR end_date >= CURRENT_DATE)) AS is_active
FROM inventory_smart.product_supersession_mapping
"""
