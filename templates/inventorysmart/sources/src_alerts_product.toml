# Article-level alerts surfaced live from PG. Filtered to rows with at
# least one active alert flag. ~29k rows on bealls. Backs dv_alerts_product.
id             = "src_alerts_product"
display_name   = "Article-level Alerts (live PG)"
kind           = "pg_query"
connection_ref = "uat"

[config]
sql = """
SELECT l0_name, l1_name, l2_name, l3_name, l4_name, l5_name,
       article, season, collection, launch_date, clearance_flag,
       overstock_flag, understock_flag, stockout_flag,
       cfc_age_gt_5_alert, cfc_age_gt_10_alert, cfc_age_gt_20_alert,
       overstock_total_wos, understock_total_wos,
       stockout_instock_per, stockout_ata, stockout_str_oh
FROM inventory_smart.alerts_product_level
WHERE COALESCE(overstock_flag,0) + COALESCE(understock_flag,0)
    + COALESCE(stockout_flag,0)
    + COALESCE(cfc_age_gt_5_alert,0)
    + COALESCE(cfc_age_gt_10_alert,0)
    + COALESCE(cfc_age_gt_20_alert,0) > 0
"""
