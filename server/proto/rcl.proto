syntax = "proto3";

package rcl;

// RCL resolution service. Backed by the `rcl` crate from rust-shared-utils.
// The service holds the live rule corpus; it subscribes to PG NOTIFY for
// rule changes and broadcasts fresh snapshots to streaming clients.
//
// Hierarchy is always provided by the caller — the service does not look
// up product attributes via PAF. Callers that don't already have hierarchy
// in hand must resolve it themselves first.
service RclService {
    // Resolve `(product_code -> DcPolicy)` for each input product.
    // Products with no matching rule are absent from the response.
    rpc ResolveDcPolicy(ResolveDcPolicyRequest) returns (ResolveDcPolicyResponse);

    // Resolve `(product_code -> [ConstraintRow])` for each input product.
    rpc ResolveConstraints(ResolveConstraintsRequest) returns (ResolveConstraintsResponse);

    // Resolve PSM rows. Per V2 spec, ranking is partitioned by `product_code`
    // only — the same `rcl_code` applies to every store of a product.
    rpc ResolvePsm(ResolvePsmRequest) returns (ResolvePsmResponse);

    // Stream the full rule corpus. Server emits a snapshot on connect, then
    // re-emits whenever the underlying rules change. Heavy clients subscribe
    // and resolve locally for V4-grade per-query latency.
    rpc Subscribe(SubscribeRequest) returns (stream RuleSetSnapshot);
}

// ── Common types ───────────────────────────────────────────────────────────

message ProductHierarchy {
    string product_code = 1;
    string l0_name = 2;
    string l1_name = 3;
    string l2_name = 4;
    string l3_name = 5;
    string l4_name = 6;
    string l5_name = 7;
    string brand   = 8;
}

// ── ResolveDcPolicy ────────────────────────────────────────────────────────

message ResolveDcPolicyRequest {
    repeated ProductHierarchy products = 1;
}

message DcPolicy {
    repeated string default_store_groups = 1;
    string default_product_profile = 2;
    string dc_store_rule = 3;
}

message ResolveDcPolicyResponse {
    // Keyed by product_code. Products with no match are absent.
    map<string, DcPolicy> resolved = 1;
    // Version of the RuleSet used for this resolution.
    uint64 version = 2;
}

// ── ResolveConstraints ─────────────────────────────────────────────────────

message ResolveConstraintsRequest {
    repeated ProductHierarchy products = 1;
}

message ConstraintRow {
    string psa_code = 1;
    double aps = 2;
    double wos = 3;
    double min_stock = 4;
    double max_stock = 5;
}

message ConstraintRowList {
    repeated ConstraintRow rows = 1;
}

message ResolveConstraintsResponse {
    map<string, ConstraintRowList> resolved = 1;
    uint64 version = 2;
}

// ── ResolvePsm ─────────────────────────────────────────────────────────────

message PsmPair {
    ProductHierarchy hierarchy = 1;
    string store_code = 2;
    string psa_code = 3;
}

message ResolvePsmRequest {
    repeated PsmPair pairs = 1;
}

message PsmResolved {
    string product_code = 1;
    string store_code = 2;
    string rcl_code = 3;
    bool is_active = 4;
}

message ResolvePsmResponse {
    repeated PsmResolved resolved = 1;
    uint64 version = 2;
}

// ── Subscribe ──────────────────────────────────────────────────────────────

message SubscribeRequest {
    // Reserved for future filtering (e.g., specific rcl_code subset).
}

message RclRule {
    string rcl_code = 1;
    int32 priority = 2;
    int32 specificity = 3;
    // Empty string means "no selector at this level" (matches anything).
    string sel_l0 = 4;
    string sel_l1 = 5;
    string sel_l2 = 6;
    string sel_l3 = 7;
    string sel_l4 = 8;
    string sel_l5 = 9;
    string sel_brand = 10;
    string sel_article = 11;
}

message DcPolicyEntry {
    string rcl_code = 1;
    DcPolicy policy = 2;
}

message ConstraintEntry {
    string rcl_code = 1;
    repeated ConstraintRow rows = 2;
}

// Full rule corpus pushed to subscribers on each rule change.
message RuleSetSnapshot {
    repeated RclRule rules = 1;
    repeated DcPolicyEntry policies = 2;
    repeated ConstraintEntry constraints = 3;
    uint64 version = 4;
    uint64 bytes_hash = 5;
}
